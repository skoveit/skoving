site_name: Skoving
site_url: https://skoveit.github.io/skoving/

copyright: ""

extra:
  generator: false
  analytics:
    provider: google
    property: G-QTX3WF018B

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - navigation.tabs  
    - navigation.sections       
    - navigation.expand      
    - navigation.path         
    - navigation.indexes           
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
  palette:
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Light mode
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg


